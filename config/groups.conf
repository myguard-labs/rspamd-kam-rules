# KAM rules symbol group.
#
# The generated kam.lua already assigns every KAM symbol to the "KAM" group via
# register_symbol{ group = 'KAM' }, so this file only carries group-level
# metadata. Drop it in as /etc/rspamd/local.d/groups.conf (or merge the block
# into your existing one).
#
# The group is UNCAPPED by default — KAM symbols score additively. To cap the
# total positive contribution of all KAM symbols, uncomment max_score.

group "KAM" {
    description = "KAM.cf rules compiled to Rspamd by rspamd-kam-rules";
    # max_score = 100;  # uncomment to cap the group's total contribution
}
