# Merge this top-level block into /etc/rspamd/rspamd.conf.local.
# A custom plugin in plugins.d is disabled unless its module is configured, so
# this block (even empty) is what activates kam.lua. Every option below has a
# baked-in default — uncomment only to override.
kam {
    enabled = true;

    # --- Rule data -----------------------------------------------------------
    # Rules live in a companion jsonl map, NOT baked into the plugin. At config
    # load the plugin reads the map synchronously and compiles every regex into
    # Rspamd's combined Hyperscan DB (one scan pass per message). Registration is
    # config-load-only, so an updated map is applied by `systemctl reload rspamd`
    # (full reconfigure). `rspamadm control reload` does NOT re-run plugin init.
    #
    # map_path   = the shipped seed, read at first boot / when no cache exists.
    #              Lives in read-only /etc/rspamd. Default:
    # map_path = "/etc/rspamd/kam_rules.map";

    # --- Self-update ---------------------------------------------------------
    # Rspamd polls `map_url` itself every `map_watch_interval` (default 5 min,
    # set in options{}) and, when the remote map changes, atomically writes it to
    # `cache_path`. No host cron, no curl: the download is Rspamd's job. The new
    # rules do NOT go live on download — registration is config-load-only — so a
    # plain `systemctl reload rspamd` timer (no fetch logic) applies them on the
    # next reconfigure. The runtime PREFERS cache_path over map_path at load.
    #
    # cache_path MUST be writable by the rspamd user. /etc/rspamd is root-owned
    # (EACCES), so the default is under DBDIR (/var/lib/rspamd). Default:
    # cache_path = "/var/lib/rspamd/kam_rules.map";
    #
    # map_url defaults to the published map on GitHub. Set it to "" to disable
    # the poll entirely (e.g. on a host that can't resolve raw.githubusercontent
    # .com — point it at an internal mirror instead). Default:
    # map_url = "https://raw.githubusercontent.com/myguard-labs/rspamd-kam-rules/main/dist/kam_rules.map";
}
